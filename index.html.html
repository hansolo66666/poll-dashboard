<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Poll Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0B0C10;
    --surface:  #1F2833;
    --surface2: #161E27;
    --border:   #2a3a47;
    --cyan:     #66FCF1;
    --teal:     #45A29E;
    --text:     #C5C6C7;
    --white:    #f0f0f0;
    --danger:   #ff4f4f;
    --warning:  #ffcc00;
    --muted:    #4a5a66;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'Inter', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── LOGIN ─── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    z-index: 1;
    background: radial-gradient(ellipse at 50% -10%, rgba(102,252,241,0.08) 0%, transparent 60%);
  }

  .login-eyebrow {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
    text-align: center;
  }

  .login-logo {
    font-family: var(--font-display);
    font-size: 72px;
    color: var(--cyan);
    letter-spacing: 6px;
    line-height: 1;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 0 40px rgba(102,252,241,0.3);
  }

  .login-tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 48px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .field-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  .server-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }

  .server-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(102,252,241,0.08);
  }

  .server-input::placeholder { color: var(--muted); }

  .pin-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .pin-box {
    width: 60px;
    height: 68px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--cyan);
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: 2px;
    text-align: center;
    outline: none;
    transition: all 0.2s;
    caret-color: transparent;
  }

  .pin-box:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(102,252,241,0.1); }
  .pin-box.filled { background: rgba(102,252,241,0.05); border-color: var(--teal); }
  .pin-box.error { border-color: var(--danger); animation: shake 0.3s; }

  @keyframes shake {
    0%,100% { transform:translateX(0); }
    25% { transform:translateX(-5px); }
    75% { transform:translateX(5px); }
  }

  .connect-btn {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    border-radius: 8px;
    color: var(--cyan);
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .connect-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .connect-btn:hover::before { transform: translateX(0); }
  .connect-btn:hover { color: var(--bg); }
  .connect-btn span { position: relative; z-index: 1; }
  .connect-btn:active { transform: scale(0.98); }

  .login-err {
    color: var(--danger);
    font-size: 12px;
    text-align: center;
    margin-top: 12px;
    min-height: 18px;
    letter-spacing: 0.5px;
  }

  /* ─── DASHBOARD ─── */
  #dashboard { display: none; position: relative; z-index: 1; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .topbar-brand {
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--cyan);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(102,252,241,0.4);
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .status-badge.online {
    background: rgba(102,252,241,0.08);
    color: var(--cyan);
    border: 1px solid rgba(102,252,241,0.2);
  }

  .status-badge.offline {
    background: rgba(255,79,79,0.08);
    color: var(--danger);
    border: 1px solid rgba(255,79,79,0.2);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .online .status-dot { animation: blink 2s infinite; }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0.2; }
  }

  .content { padding: 20px; max-width: 480px; margin: 0 auto; }

  /* ─── POLL STATUS CARD ─── */
  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .main-card.active { border-color: var(--teal); }

  .main-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--teal), var(--cyan));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .main-card.active::after { opacity: 1; }

  .card-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .poll-headline {
    font-family: var(--font-display);
    font-size: 36px;
    letter-spacing: 2px;
    margin-bottom: 4px;
    transition: color 0.3s;
  }

  .poll-headline.open { color: var(--cyan); text-shadow: 0 0 20px rgba(102,252,241,0.3); }
  .poll-headline.closed { color: var(--muted); }

  .vote-summary {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 0;
  }

  .vote-summary em { color: var(--cyan); font-style: normal; font-weight: 600; }

  /* ─── VOTE BARS ─── */
  .bars-wrap { margin-top: 18px; }

  .bar-row { margin-bottom: 12px; }

  .bar-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .bar-name {
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bar-count { font-size: 12px; color: var(--cyan); font-weight: 600; }

  .bar-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--cyan));
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .voter-names {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .voter-names.show { display: block; }

  .voter-group { margin-bottom: 10px; }

  .voter-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .voter-tag {
    display: inline-block;
    background: rgba(102,252,241,0.05);
    border: 1px solid rgba(102,252,241,0.12);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--teal);
    margin: 2px;
  }

  /* ─── SECTION LABEL ─── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 0 10px;
  }

  /* ─── ACTION BUTTONS ─── */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-grid.full { grid-template-columns: 1fr; }

  .act-btn {
    padding: 16px 14px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
    overflow: hidden;
  }

  .act-btn:active { transform: scale(0.97); }
  .act-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

  .act-btn .icon { font-size: 22px; margin-bottom: 4px; }
  .act-btn .label { font-weight: 600; font-size: 13px; }
  .act-btn .desc { font-size: 10px; color: var(--muted); }

  .act-btn.cyan {
    background: rgba(102,252,241,0.05);
    border-color: rgba(102,252,241,0.2);
  }
  .act-btn.cyan .label { color: var(--cyan); }

  .act-btn.teal {
    background: rgba(69,162,158,0.06);
    border-color: rgba(69,162,158,0.2);
  }
  .act-btn.teal .label { color: var(--teal); }

  .act-btn.red {
    background: rgba(255,79,79,0.05);
    border-color: rgba(255,79,79,0.15);
  }
  .act-btn.red .label { color: var(--danger); }

  .act-btn.yellow {
    background: rgba(255,204,0,0.05);
    border-color: rgba(255,204,0,0.15);
  }
  .act-btn.yellow .label { color: var(--warning); }

  /* ─── REFRESH BAR ─── */
  .refresh-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .refresh-ts { font-size: 11px; color: var(--muted); }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--teal);
    font-family: var(--font-body);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .refresh-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ─── MODAL ─── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 14px 14px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--teal), var(--cyan));
  }

  @keyframes slideUp {
    from { transform:translateY(40px); opacity:0; }
    to   { transform:translateY(0); opacity:1; }
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--cyan);
    margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .opt-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }

  .opt-input:focus { border-color: var(--cyan); }
  .opt-input::placeholder { color: var(--muted); }

  .opt-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .emoji-badge {
    font-size: 20px;
    width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  .opt-input-wrap .opt-input { margin-bottom: 0; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .modal-btn {
    flex: 1;
    padding: 13px;
    border-radius: 8px;
    border: none;
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .modal-btn:active { transform: scale(0.98); }
  .modal-btn.confirm { background: var(--cyan); color: var(--bg); }
  .modal-btn.cancel  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 20px;
    font-size: 13px;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok  { border-color: var(--cyan);   color: var(--cyan); }
  .toast.err { border-color: var(--danger); color: var(--danger); }

  /* ─── LOGOUT ─── */
  .logout {
    display: block;
    width: 100%;
    margin: 28px 0 32px;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .logout:hover { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-eyebrow">Control Panel</div>
  <div class="login-logo">POLL BOT</div>
  <div class="login-tagline">Powered by WhatsApp</div>

  <div class="login-card">
    <label class="field-label">Server Address</label>
    <input class="server-input" id="server-url" type="url"
      placeholder="https://xxxx.ngrok-free.app">

    <label class="field-label">PIN</label>
    <div class="pin-row">
      <input class="pin-box" id="p1" maxlength="1" type="password" inputmode="numeric">
      <input class="pin-box" id="p2" maxlength="1" type="password" inputmode="numeric">
      <input class="pin-box" id="p3" maxlength="1" type="password" inputmode="numeric">
      <input class="pin-box" id="p4" maxlength="1" type="password" inputmode="numeric">
    </div>

    <button class="connect-btn" onclick="doLogin()"><span>CONNECT</span></button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">POLL BOT</div>
    <div class="status-badge offline" id="status-badge">
      <div class="status-dot"></div>
      <span id="status-txt">Offline</span>
    </div>
  </div>

  <div class="content">
    <div class="refresh-row">
      <span class="refresh-ts" id="last-upd">Fetching...</span>
      <button class="refresh-btn" onclick="fetchState()">↻ Refresh</button>
    </div>

    <!-- Poll Card -->
    <div class="main-card" id="poll-card">
      <div class="card-eyebrow">Current Poll</div>
      <div class="poll-headline closed" id="poll-headline">No Active Poll</div>
      <div class="vote-summary" id="vote-summary">Start a poll using the buttons below</div>

      <div class="bars-wrap" id="bars-wrap" style="display:none">
        <div id="vote-bars"></div>
        <div class="voter-names" id="voter-names"></div>
      </div>
    </div>

    <!-- Start Poll -->
    <div class="section-label">Start Poll</div>
    <div class="btn-grid">
      <button class="act-btn cyan" id="btn-default" onclick="sendCmd('default')">
        <div class="icon">📋</div>
        <div class="label">Default Poll</div>
        <div class="desc">Meals & Chapathi</div>
      </button>
      <button class="act-btn teal" id="btn-custom" onclick="openModal()">
        <div class="icon">✏️</div>
        <div class="label">Custom Poll</div>
        <div class="desc">Up to 8 options</div>
      </button>
    </div>

    <!-- Manage -->
    <div class="section-label">Manage Poll</div>
    <div class="btn-grid">
      <button class="act-btn yellow" id="btn-extend" onclick="sendCmd('extend')" disabled>
        <div class="icon">⏰</div>
        <div class="label">Extend Poll</div>
        <div class="desc">Send reminder</div>
      </button>
      <button class="act-btn teal" id="btn-votes" onclick="toggleVoters()" disabled>
        <div class="icon">📊</div>
        <div class="label">View Votes</div>
        <div class="desc">See who voted</div>
      </button>
    </div>

    <!-- Close -->
    <div class="section-label">End Poll</div>
    <div class="btn-grid">
      <button class="act-btn red" id="btn-close" onclick="confirmCmd('close')" disabled>
        <div class="icon">🔒</div>
        <div class="label">Close Poll</div>
        <div class="desc">Results + email</div>
      </button>
      <button class="act-btn red" id="btn-cancel" onclick="confirmCmd('cancel')" disabled>
        <div class="icon">❌</div>
        <div class="label">Cancel Poll</div>
        <div class="desc">Reset + email</div>
      </button>
    </div>

    <button class="logout" onclick="doLogout()">⏻ &nbsp;Disconnect</button>
  </div>
</div>

<!-- ══ CUSTOM MODAL ══ -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">CUSTOM POLL</div>
    <div class="modal-sub">Enter 2–8 options. Emojis are auto-assigned.</div>
    <div id="option-fields"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-btn confirm" onclick="sendCustom()">SEND POLL</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
  const PIN = '2025';
  const SECRET = 'foodpollbot2026';

  // Emoji pool matching bot.js
  const EMOJI_POOL = [
    '😊','👍','🔥','❤️',
    '🌟','🎯','🍕','🎉','💪','🙌','😎','🌈',
    '🍔','🌮','🍜','🍱','🥗','🍛','🥘','🍲',
    '✨','💥','🎊','🏆','🎁','🚀','💡','🌺',
    '🦋','🌸','🍀','⚡','🎵','🎶','🌙','☀️'
  ];

  // Pre-generate random non-repeating emoji assignments (same seed logic as bot)
  function getEmojisForCount(n) {
    const fixed = EMOJI_POOL.slice(0, 4);
    const rest  = [...EMOJI_POOL.slice(4)].sort(() => Math.random() - 0.5);
    return [...fixed, ...rest].slice(0, n);
  }

  let serverUrl = '';
  let pollTimer = null;
  let showVoters = false;
  let currentState = null;
  let modalEmojis = [];

  // ── PIN inputs ──
  const pins = [1,2,3,4].map(i => document.getElementById(`p${i}`));

  pins.forEach((inp, i) => {
    inp.addEventListener('input', () => {
      if (inp.value) {
        inp.classList.add('filled');
        if (i < 3) pins[i+1].focus();
        else doLogin();
      }
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) {
        pins[i-1].focus();
        pins[i-1].value = '';
        pins[i-1].classList.remove('filled');
      }
    });
  });

  // ── Login ──
  function doLogin() {
    const pin = pins.map(p => p.value).join('');
    const url = document.getElementById('server-url').value.trim();
    const err = document.getElementById('login-err');

    if (!url) { err.textContent = 'Enter server address'; return; }
    if (pin.length < 4) { err.textContent = 'Enter full PIN'; return; }
    if (pin !== PIN) {
      err.textContent = 'Incorrect PIN';
      pins.forEach(p => { p.value=''; p.classList.remove('filled'); p.classList.add('error'); });
      setTimeout(() => pins.forEach(p => p.classList.remove('error')), 400);
      pins[0].focus();
      return;
    }

    serverUrl = url.replace(/\/$/, '');
    localStorage.setItem('pb-server', serverUrl);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    fetchState();
    pollTimer = setInterval(fetchState, 8000);
  }

  function doLogout() {
    clearInterval(pollTimer);
    serverUrl = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    pins.forEach(p => { p.value=''; p.classList.remove('filled'); });
  }

  // ── Fetch State ──
  async function fetchState() {
    try {
      const res = await fetch(`${serverUrl}/state`, {
        headers: { Authorization: `Bearer ${SECRET}` }
      });
      if (!res.ok) throw new Error();
      const state = await res.json();
      currentState = state;
      renderDashboard(state);
      const t = new Date();
      document.getElementById('last-upd').textContent =
        `Updated ${t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
    } catch {
      setBotStatus(false);
      document.getElementById('last-upd').textContent = 'Cannot reach PC';
    }
  }

  function setBotStatus(online) {
    const b = document.getElementById('status-badge');
    const t = document.getElementById('status-txt');
    b.className = `status-badge ${online ? 'online' : 'offline'}`;
    t.textContent = online ? 'Online' : 'Offline';
  }

  function renderDashboard(s) {
    setBotStatus(s.botOnline);
    const card     = document.getElementById('poll-card');
    const headline = document.getElementById('poll-headline');
    const summary  = document.getElementById('vote-summary');
    const barsWrap = document.getElementById('bars-wrap');

    if (s.pollOpen) {
      card.classList.add('active');
      headline.textContent = 'Poll Open';
      headline.className = 'poll-headline open';
      const total = Object.keys(s.votes||{}).length;
      summary.innerHTML = `<em>${total}</em> vote${total!==1?'s':''} received`;
      barsWrap.style.display = 'block';
      renderBars(s);
      setButtons(true);
    } else {
      card.classList.remove('active');
      headline.textContent = 'No Active Poll';
      headline.className = 'poll-headline closed';
      summary.textContent = 'Start a poll using the buttons below';
      barsWrap.style.display = 'none';
      setButtons(false);
    }
  }

  function setButtons(pollOpen) {
    ['btn-extend','btn-votes','btn-close','btn-cancel'].forEach(id =>
      document.getElementById(id).disabled = !pollOpen
    );
    document.getElementById('btn-default').disabled = pollOpen;
    document.getElementById('btn-custom').disabled  = pollOpen;
  }

  function renderBars(s) {
    const bars     = document.getElementById('vote-bars');
    const namesEl  = document.getElementById('voter-names');
    const votes    = s.votes || {};
    const options  = s.currentOptions || [];
    const emojis   = s.pollEmojis || getEmojisForCount(options.length);
    const total    = Object.keys(votes).length;

    const counts = {};
    options.forEach(o => counts[o] = 0);
    Object.values(votes).forEach(v => { if (counts[v]!==undefined) counts[v]++; });

    bars.innerHTML = options.map((opt, i) => {
      const c = counts[opt]||0;
      const p = total>0 ? Math.round(c/total*100) : 0;
      return `<div class="bar-row">
        <div class="bar-meta">
          <span class="bar-name">${emojis[i]||''} ${opt}</span>
          <span class="bar-count">${c}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${p}%"></div>
        </div>
      </div>`;
    }).join('');

    // Group voter names
    const grouped = {};
    options.forEach(o => grouped[o]=[]);
    Object.entries(votes).forEach(([n,o]) => { if(grouped[o]) grouped[o].push(n); });

    namesEl.innerHTML = options.map((opt,i) => {
      const ns = grouped[opt]||[];
      if (!ns.length) return '';
      return `<div class="voter-group">
        <div class="voter-group-label">${emojis[i]||''} ${opt}</div>
        ${ns.map(n=>`<span class="voter-tag">${n}</span>`).join('')}
      </div>`;
    }).join('');
  }

  function toggleVoters() {
    showVoters = !showVoters;
    document.getElementById('voter-names').classList.toggle('show', showVoters);
    document.getElementById('btn-votes').querySelector('.desc').textContent =
      showVoters ? 'Hide details' : 'See who voted';
  }

  // ── Send Command ──
  async function sendCmd(cmd, options=null) {
    try {
      const body = { command: cmd };
      if (options) body.options = options;
      const res = await fetch(`${serverUrl}/command`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization:`Bearer ${SECRET}` },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error();
      toast(`✅ Sent: ${cmd}`, 'ok');
      setTimeout(fetchState, 2000);
    } catch {
      toast('❌ Failed — is bot running?', 'err');
    }
  }

  function confirmCmd(cmd) {
    const msg = cmd==='close'
      ? 'Close poll and send results to group?'
      : 'Cancel poll? Current votes will be saved and emailed.';
    if (confirm(msg)) sendCmd(cmd);
  }

  // ── Custom Modal ──
  function openModal() {
    // Generate emojis for up to 8 options
    modalEmojis = getEmojisForCount(8);
    const fields = document.getElementById('option-fields');
    fields.innerHTML = [1,2,3,4,5,6,7,8].map((n,i) => `
      <div class="opt-input-wrap">
        <span class="emoji-badge">${modalEmojis[i]}</span>
        <input class="opt-input" id="mo${n}"
          placeholder="Option ${n}${n<=2?' (required)':' (optional)'}"
          maxlength="40">
      </div>`).join('');
    document.getElementById('modal').classList.add('show');
    document.getElementById('mo1').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  function sendCustom() {
    const opts = [1,2,3,4,5,6,7,8]
      .map(n => document.getElementById(`mo${n}`).value.trim())
      .filter(Boolean);
    if (opts.length < 2) { toast('⚠️ Enter at least 2 options', 'err'); return; }
    closeModal();
    sendCmd('custom', opts);
  }

  // ── Toast ──
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Init ──
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('pb-server');
    if (saved) document.getElementById('server-url').value = saved;
    pins[0].focus();
  });
</script>
</body>
</html>
